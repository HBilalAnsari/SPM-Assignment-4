<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You — QuickPOS</title>
  <meta name="description" content="Your message has been received. The QuickPOS team will be in touch soon." />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.0.3/src/regular/style.css" />
  <style>
    .thankyou-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
      position: relative;
    }
    .thankyou-card {
      background: var(--bg-card);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: 60px 50px;
      max-width: 520px;
      animation: floatUp .8s ease-out;
    }
    .thankyou-icon {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, rgba(34,197,94,.2), rgba(14,165,233,.15));
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 2.4rem;
      color: #4ade80;
      margin: 0 auto 28px;
      animation: pulse-dot 2s infinite;
    }
    .thankyou-card h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 14px;
    }
    .thankyou-card p {
      color: var(--text-secondary);
      font-size: 1.02rem;
      margin-bottom: 36px;
      line-height: 1.7;
    }
    .confetti {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .confetti span {
      position: absolute;
      width: 10px; height: 10px;
      border-radius: 2px;
      animation: confetti-fall linear forwards;
      opacity: 0;
    }
    @keyframes confetti-fall {
      0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <!-- Confetti effect -->
  <div class="confetti" id="confetti"></div>

  <div class="thankyou-page">
    <div class="thankyou-card">
      <div class="thankyou-icon">
        <i class="ph ph-check-circle"></i>
      </div>
      <h1>Thank You! 🎉</h1>
      <p>
        Your message has been received successfully.<br />
        Our team will get back to you within 24 hours.
      </p>
      <a href="index.html" class="btn btn-primary">
        <i class="ph ph-arrow-left"></i>
        Back to Home
      </a>
    </div>
  </div>

  <script>
    // Generate confetti particles
    const confettiContainer = document.getElementById('confetti');
    const colors = ['#7c3aed', '#0ea5e9', '#4ade80', '#fb923c', '#f472b6', '#facc15'];
    for (let i = 0; i < 60; i++) {
      const span = document.createElement('span');
      span.style.left = Math.random() * 100 + '%';
      span.style.background = colors[Math.floor(Math.random() * colors.length)];
      span.style.width = (Math.random() * 8 + 5) + 'px';
      span.style.height = (Math.random() * 8 + 5) + 'px';
      span.style.animationDuration = (Math.random() * 2 + 2) + 's';
      span.style.animationDelay = (Math.random() * 2) + 's';
      confettiContainer.appendChild(span);
    }
  </script>
</body>
</html>
